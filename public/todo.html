<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background-color: #0f0f0f; color: #f1f1f1; min-height: 100vh; display: flex; justify-content: center; padding: 50px 20px; }
    .container { width: 100%; max-width: 580px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 1.8rem; color: #f1f1f1; }
    .subtext { color: #888; font-size: 0.9rem; margin-top: 4px; }
    .logout-btn { background: #2a2a2a; color: #aaa; border: 1px solid #333; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .logout-btn:hover { background: #333; color: #f1f1f1; }
    .input-section {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
    input[type="text"], input[type="date"] { background: #1a1a1a; border: 1px solid #2a2a2a; color: #f1f1f1; padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; }
    input[type="text"] { flex: 1; min-width: 180px; }
input[type="date"] {
  width: 180px;
  color: #f1f1f1;
  cursor: pointer;
  color-scheme: dark;
  position: relative;
  z-index: 999;
}

    input:focus { border-color: #6366f1; }
    button { padding: 12px 20px; background-color: #6366f1; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
    button:hover { background-color: #4f46e5; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; }
    li:hover { border-color: #6366f1; }
    li.done .task-title { text-decoration: line-through; color: #555; }
    .task-info { display: flex; flex-direction: column; gap: 4px; }
    .task-title { font-size: 15px; color: #f1f1f1; }
    .task-due { font-size: 12px; color: #6366f1; }
    .task-due.overdue { color: #ef4444; }
    .actions { display: flex; gap: 8px; }
    .done-btn { background-color: #22c55e; padding: 8px 12px; font-size: 13px; border-radius: 8px; }
    .done-btn:hover { background-color: #16a34a; }
    .delete-btn { background-color: #ef4444; padding: 8px 12px; font-size: 13px; border-radius: 8px; }
    .delete-btn:hover { background-color: #dc2626; }
    .empty { text-align: center; color: #444; margin-top: 40px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 id="greeting">Hi 👋</h1>
        <p class="subtext">Here are your tasks for today</p>
      </div>
      <button class="logout-btn" onclick="changeName()">✏️ Change Name</button>
    </div>
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <input type="date" id="dueDateInput" />
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    // Get username
    const username = localStorage.getItem('username');
    if (!username) {
      window.location.href = '/';
    } else {
      document.getElementById('greeting').textContent = `Hi ${username} 👋`;
    }

    function changeName() {
      localStorage.removeItem('username');
      window.location.href = '/';
    }

    async function loadTasks() {
      try {
        const res = await fetch('/tasks');
        const tasks = await res.json();
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        if (tasks.length === 0) {
          list.innerHTML = '<p class="empty">No tasks yet! Add one above ✨</p>';
          return;
        }

        tasks.forEach(task => {
          const li = document.createElement('li');
          if (task.done) li.classList.add('done');
          const today = new Date().toISOString().split('T')[0];
          const isOverdue = task.due_date && task.due_date < today && !task.done;
          li.innerHTML = `
            <div class="task-info">
              <span class="task-title">${task.title}</span>
              ${task.due_date ? `<span class="task-due ${isOverdue ? 'overdue' : ''}">
                📅 ${isOverdue ? '⚠️ Overdue · ' : ''}${task.due_date}
              </span>` : ''}
            </div>
            <div class="actions">
              <button class="done-btn" onclick="markDone(${task.id})">✔</button>
              <button class="delete-btn" onclick="deleteTask(${task.id})">🗑</button>
            </div>
          `;
          list.appendChild(li);
        });
      } catch (err) {
        console.error('Error loading tasks:', err);
      }
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const dateInput = document.getElementById('dueDateInput');
      const title = input.value.trim();
      if (!title) return alert('Please enter a task!');
      try {
        await fetch('/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, due_date: dateInput.value || null })
        });
        input.value = '';
        dateInput.value = '';
        loadTasks();
      } catch (err) {
        console.error('Error adding task:', err);
      }
    }

    async function markDone(id) {
      try {
        await fetch(`/tasks/${id}`, { method: 'PATCH' });
        loadTasks();
      } catch (err) {
        console.error('Error marking done:', err);
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (err) {
        console.error('Error deleting task:', err);
      }
    }

    // Allow Enter key
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // Load tasks immediately
    loadTasks();
  </script>
</body>
</html>
